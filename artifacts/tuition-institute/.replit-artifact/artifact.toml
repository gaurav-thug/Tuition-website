kind = "web"
previewPath = "/"
title = "Tuition Institute Website"
version = "1.0.0"
id = "artifacts/tuition-institute"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24784

[services.development]
run = "pnpm --filter @workspace/tuition-institute run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tuition-institute", "run", "build" ]
publicDir = "artifacts/tuition-institute/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24784"
BASE_PATH = "/"
